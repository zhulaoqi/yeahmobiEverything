<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F883D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0969DA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6EDF3;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" />

  <!-- Inner subtle shadow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2" />

  <!-- "E" letter stylized as a chat/AI symbol -->
  <!-- Main "E" shape -->
  <g transform="translate(256, 256)">
    <!-- Left vertical bar of E -->
    <rect x="-120" y="-130" width="40" height="260" rx="20" fill="white" />
    <!-- Top horizontal bar -->
    <rect x="-120" y="-130" width="200" height="36" rx="18" fill="white" />
    <!-- Middle horizontal bar (shorter, with sparkle) -->
    <rect x="-120" y="-18" width="160" height="36" rx="18" fill="white" />
    <!-- Bottom horizontal bar -->
    <rect x="-120" y="94" width="200" height="36" rx="18" fill="white" />

    <!-- AI sparkle/star symbol (top right) -->
    <g transform="translate(110, -80)">
      <!-- 4-point star -->
      <path d="M0,-40 L8,-8 L40,0 L8,8 L0,40 L-8,8 L-40,0 L-8,-8 Z"
            fill="url(#sparkGrad)" opacity="0.95" />
    </g>

    <!-- Small sparkle (bottom right) -->
    <g transform="translate(80, 60)">
      <path d="M0,-20 L4,-4 L20,0 L4,4 L0,20 L-4,4 L-20,0 L-4,-4 Z"
            fill="url(#sparkGrad)" opacity="0.8" />
    </g>
  </g>
</svg>
