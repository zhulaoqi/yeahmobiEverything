<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：带圆角的渐变容器 -->
  <defs>
    <!-- 主渐变：现代蓝色 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    
    <!-- 高光渐变 -->
    <radialGradient id="highlight" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    
    <!-- 内阴影效果 -->
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 外阴影 -->
  <rect x="80" y="100" width="864" height="864" rx="220" fill="black" opacity="0.15" />
  
  <!-- 主背景：圆角矩形 + 渐变 -->
  <rect x="80" y="80" width="864" height="864" rx="220" fill="url(#mainGradient)" filter="url(#innerShadow)"/>
  
  <!-- 高光层 -->
  <ellipse cx="380" cy="280" rx="400" ry="300" fill="url(#highlight)" />
  
  <!-- Logo 图形：抽象的 "E" + 连接符号（代表 Everything） -->
  <g transform="translate(512, 512)">
    <!-- 主图形：简化的 E 字母 + 无限符号融合 -->
    
    <!-- 左侧 E 形状 -->
    <path d="M -180 -140 L -80 -140 L -80 -80 L -160 -80 L -160 -20 L -100 -20 L -100 40 L -160 40 L -160 100 L -80 100 L -80 160 L -180 160 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- 中间连接点（圆点阵列） -->
    <circle cx="-20" cy="10" r="24" fill="white" opacity="0.85"/>
    <circle cx="40" cy="10" r="20" fill="white" opacity="0.75"/>
    <circle cx="90" cy="10" r="16" fill="white" opacity="0.65"/>
    
    <!-- 右侧抽象符号（代表"一切"） -->
    <!-- 三个圆环叠加 -->
    <circle cx="160" cy="-60" r="50" fill="none" stroke="white" stroke-width="16" opacity="0.7"/>
    <circle cx="160" cy="10" r="50" fill="none" stroke="white" stroke-width="16" opacity="0.8"/>
    <circle cx="160" cy="80" r="50" fill="none" stroke="white" stroke-width="16" opacity="0.7"/>
    
    <!-- 中心强调点 -->
    <circle cx="160" cy="10" r="20" fill="white" opacity="0.9"/>
  </g>
  
  <!-- 底部微妙装饰线 -->
  <line x1="200" y1="880" x2="824" y2="880" stroke="white" stroke-width="4" opacity="0.2" stroke-linecap="round"/>
</svg>
