name: Build & Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────
  # 阶段 1：编译 + 测试 + 生成跨平台 Fat JAR
  # ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build & Test
        run: ./mvnw clean package -DskipTests

      - name: Upload Fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: fat-jar
          path: everything-client/target/yeahmobi-everything-*-all.jar

  # ──────────────────────────────────────────────────
  # 阶段 2：在各平台 runner 上生成原生安装包
  # ──────────────────────────────────────────────────
  package:
    needs: build
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: installer-windows
            extension: msi
          - os: macos-latest
            artifact: installer-macos
            extension: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build project (multi-module)
        run: ./mvnw clean package -DskipTests
        shell: bash

      - name: Generate native installer
        run: ./mvnw jpackage:jpackage -pl everything-client
        shell: bash

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: everything-client/target/dist/*.${{ matrix.extension }}

  # ──────────────────────────────────────────────────
  # 阶段 3：合并所有产物到一个 Release
  # ──────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/fat-jar/*
            artifacts/installer-windows/*
            artifacts/installer-macos/*
          generate_release_notes: true
