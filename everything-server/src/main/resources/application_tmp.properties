# SMTP Email Configuration (验证码邮件发送)
# -----------------------------------------------
# QQ 邮箱示例：smtp.host=smtp.qq.com, smtp.port=465, smtp.ssl=true
# 163 邮箱示例：smtp.host=smtp.163.com, smtp.port=465, smtp.ssl=true
# Gmail 示例：smtp.host=smtp.gmail.com, smtp.port=587, smtp.ssl=false (使用 STARTTLS)
# -----------------------------------------------
# 注意：QQ/163 邮箱需要使用授权码（非登录密码），在邮箱设置中开启 SMTP 并获取
smtp.host=
smtp.port=
smtp.username=
smtp.password=
smtp.from=
smtp.ssl=

# Backend API Configuration
backend.api.url=

# MySQL Database Configuration
mysql.url=
mysql.username=
mysql.password=

# Redis Cache Configuration
redis.host=
redis.port=
redis.password=
redis.database=

# Local SQLite Database Configuration
db.local.path=${user.home}/.yeahmobi-everything/data.db

# Application Configuration
app.name=Yeahmobi Everything
app.version=1.0.0
app.theme=light
